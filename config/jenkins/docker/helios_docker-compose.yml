services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-sandbox
    hostname: jenkins
    domainname: jenkins.greece.local
    mac_address: 62:db:46:95:d1:62
    privileged: true
    user: root
    ports:
      - 8091:8080
      - 50000:50000
    volumes:
      - /opt/jenkins/home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins_nw
  rust_java_backend_node:
    image: 192.168.1.217:5000/jenkins_java_rust_agent
    container_name: rust_java_backend_node
    hostname: rust_java_backend_node
    mac_address: e2:26:76:25:9f:8b
    privileged: true
    user: root
    networks:
      - jenkins_nw

networks:
  jenkins_nw:
    external: true
