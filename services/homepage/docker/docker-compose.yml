services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: greece.local # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      PUID: 1001 # optional, your user id
      PGID: 1001 # optional, your group id
    ports:
      - {{ salt['pillar.get']('homepage_nginx_port') }}:{{ salt['pillar.get']('homepage_container_port') }}
    volumes:
      - /opt/homepage/config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # optional, for docker integrations
    restart: unless-stopped
