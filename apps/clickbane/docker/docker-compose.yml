services:
  clickbane_backend:
    image: 192.168.1.217:5000/clickbane_be
    container_name: clickbane_backend
    ports:
      - 9000:9000
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://root:${DBPASS}@bors.greece.local:3306/clickbane
    volumes:
      - /opt/clickbane/configuration.db:/configuration.db
    networks:
      - clickbane_nw

  clickbane_frontend:
    image: 192.168.1.217:5000/clickbane_fe
    container_name: clickbane_frontend
    ports:
      - 8000:8000
    restart: unless-stopped
    networks:
    - clickbane_nw


networks:
  clickbane_nw:
    external: true
