services:
 backend:
  image: 192.168.1.217:5000/vids_be
  container_name: vids_be
  ports:
    - "{{ salt['pillar.get']('vids_be') }}:9000"
  restart: always
  networks:
    - vids_nw

 frontend:
  image: 192.168.1.217:5000/vids_fe
  container_name: vids_fe
  ports:
    - "{{ salt['pillar.get']('vids_fe') }}:8000"
  restart: always
  networks:
    - vids_nw

networks:
  vids_nw:
    external: true
